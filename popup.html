<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aegis Mail</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <div class="popup-header">
      <div class="popup-logo">
        <img src="public/icons/icon32.png" alt="Aegis" width="24" height="24">
        <span class="popup-title">Aegis Mail</span>
      </div>
      <button class="settings-btn" id="settingsBtn" title="設定">⚙️</button>
    </div>
    <div class="popup-status" id="statusArea">
      <div class="status-indicator" id="statusIndicator"></div>
      <span id="statusText">檢測中...</span>
    </div>
    <div class="popup-actions">
      <button class="analyze-btn" id="analyzeBtn" disabled>
        📊 分析郵件
      </button>
    </div>
    <div class="popup-footer">
      <span class="mode-badge" id="modeBadge">本地模式</span>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
